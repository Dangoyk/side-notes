<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Notes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Visible strip shown when panel is hidden (left edge of window) -->
  <div id="edge-handle">&#8250;</div>

  <!-- Title bar (draggable region) -->
  <div id="titlebar">
    <span id="app-title">Side Notes <span id="version">v1.0.0</span></span>
    <div id="win-controls">
      <button id="btn-settings" title="Settings">&#9881;</button>
      <button id="btn-minimize" title="Minimize">&#8212;</button>
      <button id="btn-close" title="Close">&#x2715;</button>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab active" data-tab="notes">Notes</button>
    <button class="tab" data-tab="shots">Shots</button>
  </div>

  <!-- Notes tab -->
  <div id="tab-notes" class="tab-pane active">
    <div class="toolbar">
      <button id="btn-new-note">+ New Note</button>
      <span class="kbd-hint">Ctrl+N</span>
    </div>
    <div id="notes-list" class="scroll-area" tabindex="0"></div>
  </div>

  <!-- Screenshots tab -->
  <div id="tab-shots" class="tab-pane">
    <div class="toolbar">
      <button id="btn-capture">Capture</button>
      <span class="kbd-hint">Ctrl+Shift+S</span>
    </div>
    <div id="shots-list" class="scroll-area" tabindex="0"></div>
  </div>

  <!-- Calculator (sticky bottom, collapsible) -->
  <div id="calc-panel">
    <button id="calc-toggle-btn">Calculator <span id="calc-arrow">&#9650;</span></button>
    <div id="calc-body" class="hidden">
      <div id="calc-display">
        <div id="calc-expr"></div>
        <div id="calc-val">0</div>
      </div>
      <div id="calc-btns">
        <button class="cb fn" data-action="clear">C</button>
        <button class="cb fn" data-action="sign">+/-</button>
        <button class="cb fn" data-action="pct">%</button>
        <button class="cb op" data-action="op" data-op="/">&#247;</button>

        <button class="cb" data-action="digit" data-digit="7">7</button>
        <button class="cb" data-action="digit" data-digit="8">8</button>
        <button class="cb" data-action="digit" data-digit="9">9</button>
        <button class="cb op" data-action="op" data-op="*">&#215;</button>

        <button class="cb" data-action="digit" data-digit="4">4</button>
        <button class="cb" data-action="digit" data-digit="5">5</button>
        <button class="cb" data-action="digit" data-digit="6">6</button>
        <button class="cb op" data-action="op" data-op="-">&#8722;</button>

        <button class="cb" data-action="digit" data-digit="1">1</button>
        <button class="cb" data-action="digit" data-digit="2">2</button>
        <button class="cb" data-action="digit" data-digit="3">3</button>
        <button class="cb op" data-action="op" data-op="+">+</button>

        <button class="cb wide" data-action="digit" data-digit="0">0</button>
        <button class="cb" data-action="dot">.</button>
        <button class="cb eq" data-action="equals">=</button>
      </div>
    </div>
  </div>

  <!-- Note editor modal -->
  <div id="note-modal" class="modal hidden">
    <div class="note-modal-bar">
      <input id="note-title-input" type="text" placeholder="Title..." maxlength="120" autocomplete="off">
      <button id="btn-save-note" class="btn-accent">Save</button>
      <button id="btn-cancel-note" class="btn-ghost">&#x2715;</button>
    </div>
    <textarea id="note-body-input" placeholder="Write your note here...&#10;&#10;Puzzle hints, coordinates, solutions — anything you need."></textarea>
  </div>

  <!-- Screenshot editor modal -->
  <div id="editor-modal" class="modal hidden">
    <div id="editor-bar">
      <button class="tool active" data-tool="pen">Pen</button>
      <button class="tool" data-tool="rect">Rect</button>
      <button class="tool" data-tool="arrow">Arrow</button>
      <button class="tool" data-tool="text">Text</button>
      <button class="tool" data-tool="eraser">Erase</button>
      <span class="bar-sep"></span>
      <input type="color" id="color-picker" value="#ff3b3b" title="Color">
      <input type="range" id="size-slider" min="1" max="20" value="3" title="Size">
      <span class="bar-sep"></span>
      <button id="btn-undo" title="Ctrl+Z">Undo</button>
      <button id="btn-save-ss" class="btn-green" title="Ctrl+S">Save</button>
      <button id="btn-cancel-editor" class="btn-ghost" title="Esc">&#x2715;</button>
    </div>
    <div id="canvas-wrap">
      <canvas id="editor-canvas"></canvas>
      <div id="text-overlay" class="hidden">
        <input id="text-input" type="text" placeholder="Type then Enter...">
      </div>
    </div>
  </div>

  <!-- Image viewer modal -->
  <div id="viewer-modal" class="modal hidden">
    <div id="viewer-bar">
      <button id="btn-edit-from-viewer" class="btn-accent">Edit</button>
      <button id="btn-close-viewer" class="btn-ghost">&#x2715;</button>
    </div>
    <div id="viewer-wrap">
      <img id="viewer-img" src="" alt="screenshot">
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="note-modal-bar">
      <span style="font-weight:600;font-size:13px;">Settings</span>
      <button id="btn-close-settings" class="btn-ghost">&#x2715;</button>
    </div>
    <div class="settings-body">
      <div class="settings-row">
        <span class="settings-label">Toggle hotkey</span>
        <input id="hotkey-input" type="text" readonly placeholder="Click, then press a key...">
        <span class="settings-hint">Press any key or combo: F9, Alt+K, Ctrl+Space, etc.<br>This toggles the panel from anywhere, even inside Roblox.</span>
      </div>
      <button id="btn-apply-hotkey" class="btn-accent">Apply</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
